services:

  nginx:
    image: nginx:alpine
    container_name: wp-nginx
    ports:
      - "${WP_PORT:-8080}:80"
    volumes:
      - wordpress_data:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./plugins:/var/www/html/wp-content/plugins
      - ./themes:/var/www/html/wp-content/themes
      - ./ssl:/etc/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - wordpress
    networks:
      - wordpress
    restart: unless-stopped

  wordpress:
    image: wordpress:latest-fpm
    container_name: wp-wordpress
    volumes:
      - wordpress_data:/var/www/html
      - ./plugins:/var/www/html/wp-content/plugins
      - ./themes:/var/www/html/wp-content/themes
      - ./config/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_DB_USER: ${MYSQL_USER:-wp_user}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wp_password}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_REDIS_HOST', 'redis');
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wordpress
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: wp-db
    environment:
      MARIADB_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MARIADB_USER: ${MYSQL_USER:-wp_user}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-wp_password}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wordpress
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: wp-redis
    volumes:
      - redis_data:/data
    networks:
      - wordpress
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wp-phpmyadmin
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-wp_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-wp_password}
      UPLOAD_LIMIT: 75M
    depends_on:
      - db
    networks:
      - wordpress
    profiles:
      - dev
    restart: unless-stopped

volumes:
  wordpress_data:
  db_data:
  redis_data:

networks:
  wordpress:
    name: wp-wordpress
    driver: bridge
