services:

  # ─── Banco de Dados ──────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: wp-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MARIADB_USER: ${MYSQL_USER:-wp_user}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-wp_password}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - db_data:/var/lib/mysql
      - ./dumps:/dumps
    networks:
      - wordpress
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── WordPress (PHP-FPM) ──────────────────────────────────────
  wordpress:
    image: wordpress:fpm-alpine
    container_name: wp-wordpress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_DB_USER: ${MYSQL_USER:-wp_user}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wp_password}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', ${WP_DEBUG:-true});
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
    volumes:
      - wordpress_data:/var/www/html
      - ./plugins:/var/www/html/wp-content/plugins
      - ./themes:/var/www/html/wp-content/themes
      - ./config/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    networks:
      - wordpress

  # ─── Nginx ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: wp-nginx
    restart: unless-stopped
    ports:
      - "${WP_PORT:-8080}:80"
    depends_on:
      - wordpress
    volumes:
      - wordpress_data:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./plugins:/var/www/html/wp-content/plugins
      - ./themes:/var/www/html/wp-content/themes
      - ./ssl:/etc/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - wordpress

  # ─── WP-CLI ──────────────────────────────────────────────────
  wpcli:
    image: wordpress:cli
    container_name: wp-cli
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-wp_user}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wp_password}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
    volumes:
      - wordpress_data:/var/www/html
      - ./plugins:/var/www/html/wp-content/plugins
      - ./themes:/var/www/html/wp-content/themes
      - ./dumps:/dumps
    networks:
      - wordpress
    # Uso: docker compose run --rm wpcli wp <comando>

  # ─── Redis (opcional) ────────────────────────────────────────
  # Para ativar: docker compose --profile redis up -d
  # Depois: docker compose exec wpcli wp redis enable
  redis:
    image: redis:alpine
    container_name: wp-redis
    restart: unless-stopped
    profiles:
      - redis
    volumes:
      - redis_data:/data
    networks:
      - wordpress
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── phpMyAdmin (apenas em dev) ──────────────────────────────
  # Para ativar: docker compose --profile dev up -d
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wp-phpmyadmin
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-wp_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-wp_password}
      UPLOAD_LIMIT: 128M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wordpress

networks:
  wordpress:
    name: wp-wordpress
    driver: bridge

volumes:
  db_data:
  wordpress_data:
  redis_data:
